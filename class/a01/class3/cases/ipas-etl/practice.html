<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>iPAS AI 應用規劃師 - 互動練習系統</title>
  <meta name="description" content="115年第一次初級AI應用規劃師第一科：人工智慧基礎概論互動自修練習系統。提供單題閃卡與模擬考模式。">
  <!-- 引入 Google Fonts -->
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Noto+Sans+TC:wght@400;500;700;900&family=Outfit:wght@400;600;800&display=swap" rel="stylesheet">
  
  <style>
    /* CSS 設計系統與變數定義 */
    :root {
      /* 深色模式變數 (預設) */
      --bg-gradient: linear-gradient(135deg, #0b1528 0%, #0d1e36 50%, #08101e 100%);
      --card-bg: rgba(20, 35, 60, 0.65);
      --card-border: rgba(255, 255, 255, 0.08);
      --text-main: #f3f6fa;
      --text-muted: #9ab0cf;
      --primary: #2563eb;
      --primary-hover: #3b82f6;
      --primary-glow: rgba(37, 99, 235, 0.45);
      --success: #10b981;
      --success-bg: rgba(16, 185, 129, 0.15);
      --success-border: rgba(16, 185, 129, 0.3);
      --danger: #ef4444;
      --danger-bg: rgba(239, 68, 68, 0.15);
      --danger-border: rgba(239, 68, 68, 0.3);
      --warning: #f59e0b;
      --warning-bg: rgba(245, 158, 11, 0.15);
      --nav-btn-bg: rgba(255, 255, 255, 0.05);
      --nav-btn-hover: rgba(255, 255, 255, 0.12);
      
      --shadow-main: 0 20px 40px -15px rgba(0, 0, 0, 0.5);
      --glass-blur: blur(16px);
      --transition-speed: 0.25s;
    }

    [data-theme="light"] {
      /* 淺色模式變數 */
      --bg-gradient: linear-gradient(135deg, #f4f7fc 0%, #e9eff8 100%);
      --card-bg: rgba(255, 255, 255, 0.85);
      --card-border: rgba(9, 30, 66, 0.08);
      --text-main: #1e293b;
      --text-muted: #64748b;
      --primary: #0284c7;
      --primary-hover: #0369a1;
      --primary-glow: rgba(2, 132, 199, 0.25);
      --success: #16a34a;
      --success-bg: rgba(22, 163, 74, 0.1);
      --success-border: rgba(22, 163, 74, 0.25);
      --danger: #dc2626;
      --danger-bg: rgba(220, 38, 38, 0.08);
      --danger-border: rgba(220, 38, 38, 0.2);
      --warning: #d97706;
      --warning-bg: rgba(217, 119, 6, 0.1);
      --nav-btn-bg: rgba(9, 30, 66, 0.05);
      --nav-btn-hover: rgba(9, 30, 66, 0.1);
      
      --shadow-main: 0 20px 40px -15px rgba(9, 30, 66, 0.12);
    }

    * {
      box-sizing: border-box;
      margin: 0;
      padding: 0;
    }

    body {
      font-family: 'Noto Sans TC', system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, sans-serif;
      min-height: 100vh;
      background: var(--bg-gradient);
      color: var(--text-main);
      display: flex;
      flex-direction: column;
      align-items: center;
      transition: background var(--transition-speed), color var(--transition-speed);
      overflow-x: hidden;
      padding: 24px 16px;
    }

    header {
      width: 100%;
      max-width: 960px;
      margin-bottom: 24px;
      display: flex;
      justify-content: space-between;
      align-items: center;
      gap: 16px;
    }

    .header-info h1 {
      font-size: clamp(1.4rem, 4vw, 2.2rem);
      font-weight: 900;
      line-height: 1.2;
      background: linear-gradient(90deg, #38bdf8, #818cf8);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      margin-bottom: 6px;
    }

    [data-theme="light"] .header-info h1 {
      background: linear-gradient(90deg, #0369a1, #4338ca);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
    }

    .header-info p {
      font-size: 0.95rem;
      color: var(--text-muted);
      font-weight: 500;
    }

    .theme-toggle-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      width: 44px;
      height: 44px;
      border-radius: 50px;
      display: flex;
      justify-content: center;
      align-items: center;
      cursor: pointer;
      color: var(--text-main);
      transition: all 0.2s ease;
      backdrop-filter: var(--glass-blur);
    }

    .theme-toggle-btn:hover {
      transform: scale(1.05);
      border-color: var(--text-muted);
    }

    .theme-toggle-btn svg {
      width: 20px;
      height: 20px;
      fill: currentColor;
    }

    main {
      width: 100%;
      max-width: 960px;
      display: grid;
      grid-template-columns: 1fr;
      gap: 24px;
    }

    @media (min-width: 768px) {
      main {
        grid-template-columns: 280px 1fr;
      }
    }

    /* 側邊設定面板 */
    .sidebar {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .panel-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 16px;
      padding: 20px;
      backdrop-filter: var(--glass-blur);
      box-shadow: var(--shadow-main);
      transition: background var(--transition-speed), border-color var(--transition-speed);
    }

    .panel-card h3 {
      font-size: 1.1rem;
      font-weight: 700;
      margin-bottom: 16px;
      border-bottom: 2px solid var(--card-border);
      padding-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .form-group {
      margin-bottom: 16px;
    }

    .form-group:last-child {
      margin-bottom: 0;
    }

    .form-group label {
      display: block;
      font-size: 0.85rem;
      font-weight: 700;
      color: var(--text-muted);
      margin-bottom: 8px;
    }

    .mode-selector {
      display: flex;
      flex-direction: column;
      gap: 8px;
    }

    .mode-btn {
      background: var(--nav-btn-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 10px 16px;
      border-radius: 8px;
      cursor: pointer;
      font-size: 0.9rem;
      font-weight: 700;
      text-align: left;
      transition: all 0.2s ease;
      display: flex;
      align-items: center;
      justify-content: space-between;
    }

    .mode-btn:hover {
      background: var(--nav-btn-hover);
    }

    .mode-btn.active {
      background: var(--primary);
      border-color: var(--primary);
      color: white;
      box-shadow: 0 0 12px var(--primary-glow);
    }

    .custom-select {
      width: 100%;
      padding: 10px;
      background: var(--nav-btn-bg);
      border: 1px solid var(--card-border);
      border-radius: 8px;
      color: var(--text-main);
      font-weight: 500;
      cursor: pointer;
      outline: none;
      font-size: 0.9rem;
    }

    .custom-select option {
      background: #0d1e36;
      color: white;
    }
    [data-theme="light"] .custom-select option {
      background: white;
      color: #1e293b;
    }

    .switch-group {
      display: flex;
      align-items: center;
      justify-content: space-between;
      cursor: pointer;
      user-select: none;
    }

    .switch-label {
      font-size: 0.9rem;
      font-weight: 600;
      color: var(--text-main);
    }

    .switch-control {
      position: relative;
      width: 48px;
      height: 24px;
      background: var(--nav-btn-bg);
      border: 1px solid var(--card-border);
      border-radius: 100px;
      transition: background 0.3s;
    }

    .switch-control::after {
      content: '';
      position: absolute;
      width: 18px;
      height: 18px;
      border-radius: 50%;
      background: var(--text-muted);
      top: 2px;
      left: 2px;
      transition: all 0.2s ease;
    }

    .switch-group.checked .switch-control {
      background: var(--success);
    }

    .switch-group.checked .switch-control::after {
      left: 26px;
      background: white;
    }

    /* 統計面板元件 */
    .stat-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 12px;
    }

    .stat-row:last-child {
      margin-bottom: 0;
    }

    .stat-label {
      font-size: 0.9rem;
      color: var(--text-muted);
    }

    .stat-val {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
    }

    .progress-bar-container {
      width: 100%;
      height: 8px;
      background: var(--nav-btn-bg);
      border-radius: 100px;
      margin-top: 14px;
      overflow: hidden;
    }

    .progress-bar-fill {
      height: 100%;
      width: 0%;
      background: linear-gradient(90deg, var(--primary), #818cf8);
      border-radius: 100px;
      transition: width 0.3s ease;
    }

    /* 考卷導航面板 */
    .navigator-grid {
      display: grid;
      grid-template-columns: repeat(5, 1fr);
      gap: 6px;
      max-height: 260px;
      overflow-y: auto;
      padding-right: 4px;
    }

    .nav-dot {
      aspect-ratio: 1;
      border-radius: 8px;
      background: var(--nav-btn-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      display: flex;
      justify-content: center;
      align-items: center;
      font-family: 'Outfit', sans-serif;
      font-weight: 600;
      font-size: 0.85rem;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .nav-dot:hover {
      background: var(--nav-btn-hover);
    }

    .nav-dot.answered {
      background: rgba(37, 99, 235, 0.25);
      border-color: var(--primary);
    }

    .nav-dot.current {
      border: 2px solid var(--text-main);
      font-weight: 800;
    }

    .nav-dot.correct {
      background: var(--success-bg);
      border-color: var(--success);
      color: var(--success);
    }

    .nav-dot.wrong {
      background: var(--danger-bg);
      border-color: var(--danger);
      color: var(--danger);
    }

    /* 主作答卡片 */
    .quiz-area {
      display: flex;
      flex-direction: column;
      gap: 20px;
    }

    .quiz-card {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 20px;
      padding: 24px;
      backdrop-filter: var(--glass-blur);
      box-shadow: var(--shadow-main);
      min-height: 420px;
      display: flex;
      flex-direction: column;
      justify-content: space-between;
      position: relative;
    }

    .quiz-header {
      display: flex;
      justify-content: space-between;
      align-items: center;
      margin-bottom: 20px;
    }

    .quiz-num-badge {
      background: var(--primary-glow);
      border: 1px solid var(--primary);
      color: var(--text-main);
      padding: 6px 14px;
      border-radius: 50px;
      font-weight: 700;
      font-size: 0.9rem;
      font-family: 'Outfit', sans-serif;
    }

    .exam-timer {
      font-family: 'Outfit', sans-serif;
      font-size: 1.1rem;
      font-weight: 700;
      color: var(--warning);
      display: flex;
      align-items: center;
      gap: 6px;
    }

    .question-body {
      font-size: 1.15rem;
      font-weight: 500;
      line-height: 1.6;
      margin-bottom: 24px;
    }

    .options-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
      margin-bottom: 24px;
    }

    .option-item {
      background: var(--nav-btn-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px 18px;
      cursor: pointer;
      display: flex;
      align-items: flex-start;
      gap: 12px;
      transition: all 0.2s cubic-bezier(0.4, 0, 0.2, 1);
      text-align: left;
    }

    .option-item:hover {
      background: var(--nav-btn-hover);
      transform: translateY(-1px);
    }

    .option-label {
      background: var(--card-border);
      border-radius: 6px;
      width: 26px;
      height: 26px;
      display: flex;
      justify-content: center;
      align-items: center;
      font-weight: 800;
      font-size: 0.9rem;
      flex-shrink: 0;
    }

    .option-text {
      font-size: 1rem;
      line-height: 1.5;
      font-weight: 500;
    }

    /* 單題作答反饋狀態 */
    .option-item.selected {
      background: var(--primary-glow);
      border-color: var(--primary);
    }

    .option-item.correct {
      background: var(--success-bg) !important;
      border-color: var(--success) !important;
      color: var(--success);
    }

    .option-item.correct .option-label {
      background: var(--success);
      color: white;
    }

    .option-item.wrong {
      background: var(--danger-bg) !important;
      border-color: var(--danger) !important;
      color: var(--danger);
    }

    .option-item.wrong .option-label {
      background: var(--danger);
      color: white;
    }

    /* 單題解析面板 */
    .explanation-panel {
      margin-top: 10px;
      padding: 16px;
      border-radius: 12px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .explanation-panel.show {
      display: block;
    }

    .explanation-panel.correct-explanation {
      background: var(--success-bg);
      border: 1px solid var(--success-border);
    }

    .explanation-panel.wrong-explanation {
      background: var(--danger-bg);
      border: 1px solid var(--danger-border);
    }

    .explanation-title {
      font-weight: 700;
      margin-bottom: 8px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    /* 下方導航按鈕 */
    .control-actions {
      display: flex;
      justify-content: space-between;
      gap: 16px;
      margin-top: auto;
      padding-top: 20px;
      border-top: 1px solid var(--card-border);
    }

    .btn {
      padding: 12px 24px;
      border-radius: 10px;
      font-size: 0.95rem;
      font-weight: 700;
      cursor: pointer;
      transition: all 0.2s ease;
      display: inline-flex;
      align-items: center;
      gap: 8px;
      border: none;
      outline: none;
    }

    .btn-secondary {
      background: var(--nav-btn-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
    }

    .btn-secondary:hover:not(:disabled) {
      background: var(--nav-btn-hover);
    }

    .btn-secondary:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }

    .btn-primary {
      background: var(--primary);
      color: white;
      box-shadow: 0 4px 12px var(--primary-glow);
    }

    .btn-primary:hover:not(:disabled) {
      background: var(--primary-hover);
      transform: translateY(-1px);
    }

    .btn-success {
      background: var(--success);
      color: white;
      box-shadow: 0 4px 12px rgba(16, 185, 129, 0.3);
    }

    .btn-success:hover {
      background: #059669;
      transform: translateY(-1px);
    }

    /* 送出考試報告 Modal */
    .report-overlay {
      position: fixed;
      top: 0;
      left: 0;
      width: 100vw;
      height: 100vh;
      background: rgba(0, 0, 0, 0.6);
      backdrop-filter: blur(8px);
      z-index: 100;
      display: flex;
      justify-content: center;
      align-items: center;
      opacity: 0;
      pointer-events: none;
      transition: opacity 0.3s ease;
      padding: 16px;
    }

    .report-overlay.show {
      opacity: 1;
      pointer-events: auto;
    }

    .report-modal {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      border-radius: 24px;
      max-width: 600px;
      width: 100%;
      padding: 30px;
      backdrop-filter: var(--glass-blur);
      box-shadow: 0 30px 60px rgba(0, 0, 0, 0.6);
      transform: scale(0.9);
      transition: transform 0.3s cubic-bezier(0.34, 1.56, 0.64, 1);
      max-height: 90vh;
      overflow-y: auto;
      text-align: center;
    }

    .report-overlay.show .report-modal {
      transform: scale(1);
    }

    .report-badge {
      width: 80px;
      height: 80px;
      background: var(--primary-glow);
      border-radius: 50%;
      display: flex;
      justify-content: center;
      align-items: center;
      margin: 0 auto 20px;
      color: var(--primary);
    }

    .report-modal h2 {
      font-size: 1.8rem;
      margin-bottom: 12px;
      font-weight: 800;
    }

    .score-circle {
      display: inline-flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      width: 130px;
      height: 130px;
      border-radius: 50%;
      border: 6px solid var(--primary);
      margin: 16px 0;
    }

    .score-num {
      font-family: 'Outfit', sans-serif;
      font-size: 2.5rem;
      font-weight: 800;
      line-height: 1;
    }

    .score-total {
      font-size: 0.9rem;
      color: var(--text-muted);
      margin-top: 4px;
    }

    .report-details {
      display: grid;
      grid-template-columns: repeat(2, 1fr);
      gap: 16px;
      margin: 20px 0;
      text-align: left;
    }

    .detail-card {
      background: var(--nav-btn-bg);
      border: 1px solid var(--card-border);
      border-radius: 12px;
      padding: 14px;
    }

    .detail-title {
      font-size: 0.85rem;
      color: var(--text-muted);
      margin-bottom: 4px;
    }

    .detail-value {
      font-family: 'Outfit', sans-serif;
      font-size: 1.3rem;
      font-weight: 700;
    }

    .report-actions {
      display: flex;
      gap: 12px;
      justify-content: center;
      margin-top: 24px;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(4px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* 空狀態 */
    .empty-state {
      display: flex;
      flex-direction: column;
      justify-content: center;
      align-items: center;
      height: 300px;
      color: var(--text-muted);
      gap: 12px;
    }

    /* 自訂捲軸 */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--card-border);
      border-radius: 10px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--text-muted);
    }

    /* 頂部導覽列按鈕 */
    .nav-link-btn {
      background: var(--card-bg);
      border: 1px solid var(--card-border);
      color: var(--text-main);
      padding: 10px 18px;
      border-radius: 50px;
      font-size: 0.9rem;
      font-weight: 700;
      text-decoration: none;
      display: inline-flex;
      align-items: center;
      gap: 6px;
      transition: all 0.2s ease;
      backdrop-filter: var(--glass-blur);
    }
    
    .nav-link-btn:hover {
      transform: translateY(-2px);
      border-color: var(--primary);
      box-shadow: 0 4px 12px var(--primary-glow);
      color: var(--text-main);
    }
  </style>
</head>

    <div style="display: flex; align-items: center; gap: 12px; margin-left: auto;">

    <button class="theme-toggle-btn" id="themeToggle" title="切換主題">
      <!-- 太陽圖示 -->
      <svg class="sun-icon" style="display: none;" viewBox="0 0 24 24">

      </svg>

  <!-- 載入題庫 JS -->
  <script src="questions.js"></script>

  <!-- 核心控制 Script -->
  <script>
    // 取得資料源，若載入失敗則使用備份
    const rawData = (typeof QUESTIONS !== 'undefined') ? QUESTIONS : [
      {
        id: 1,
        answer: "D",
        question: "題庫載入失敗，請確認同目錄下是否存在 questions.js 檔案。",
        options: {
          A: "選項 A",
          B: "選項 B",
          C: "選項 C",
          D: "確認檔案位置後重新整理網頁"
        }
      }
    ];

    // 狀態管理
    const state = {
      mode: 'single', // 'single' | 'exam'
      questions: [],  // 當前篩選/打亂後的題目列表
      currentIndex: 0,
      
      // 自修模式答題記錄
      singleAnswers: {}, // { questionId: selectedOption }
      
      // 模擬考模式答題記錄
      examAnswers: {},   // { questionId: selectedOption }
      examSubmitted: false,
      examStartTime: 0,
      examTimerInterval: null,
      examDurationSeconds: 0,
      
      // 設定
      range: 'all',
      shuffle: false,
      theme: 'dark'
    };

    // DOM 元素快照
    const themeToggle = document.getElementById('themeToggle');
    const sunIcon = themeToggle.querySelector('.sun-icon');
    const moonIcon = themeToggle.querySelector('.moon-icon');
    const modeSingleBtn = document.getElementById('modeSingleBtn');
    const modeExamBtn = document.getElementById('modeExamBtn');
    const rangeSelect = document.getElementById('rangeSelect');
    const shuffleSwitch = document.getElementById('shuffleSwitch');
    
    const statProgress = document.getElementById('statProgress');
    const statCorrectWrong = document.getElementById('statCorrectWrong');
    const statRate = document.getElementById('statRate');
    const progressBarFill = document.getElementById('progressBarFill');
    const navigatorCard = document.getElementById('navigatorCard');
    const navigatorGrid = document.getElementById('navigatorGrid');

    const quizCard = document.getElementById('quizCard');
    const questionNumBadge = document.getElementById('questionNumBadge');
    const examTimer = document.getElementById('examTimer');
    const timerVal = document.getElementById('timerVal');
    const questionBody = document.getElementById('questionBody');
    const optionsList = document.getElementById('optionsList');
    const explanationPanel = document.getElementById('explanationPanel');
    const explanationTitle = document.getElementById('explanationTitle');
    const explanationText = document.getElementById('explanationText');
    
    const prevBtn = document.getElementById('prevBtn');
    const nextBtn = document.getElementById('nextBtn');
    const submitExamBtn = document.getElementById('submitExamBtn');
    
    const reportOverlay = document.getElementById('reportOverlay');
    const reportScore = document.getElementById('reportScore');
    const reportCorrectCount = document.getElementById('reportCorrectCount');
    const reportWrongCount = document.getElementById('reportWrongCount');
    const reportTimeUsed = document.getElementById('reportTimeUsed');
    const reportPr = document.getElementById('reportPr');
    const modalReviewBtn = document.getElementById('modalReviewBtn');
    const modalRetryBtn = document.getElementById('modalRetryBtn');

    // 初始化設定與主題
    function init() {
      // 讀取 LocalStorage 紀錄
      const savedTheme = localStorage.getItem('ipas_theme') || 'dark';
      setTheme(savedTheme);

      const savedMode = localStorage.getItem('ipas_mode') || 'single';
      switchMode(savedMode);

      // 事件綁定
      themeToggle.addEventListener('click', toggleTheme);
      modeSingleBtn.addEventListener('click', () => switchMode('single'));
      modeExamBtn.addEventListener('click', () => switchMode('exam'));
      rangeSelect.addEventListener('change', (e) => {
        state.range = e.target.value;
        resetQuiz();
      });
      shuffleSwitch.addEventListener('click', () => {
        state.shuffle = !state.shuffle;
        shuffleSwitch.classList.toggle('checked', state.shuffle);
        resetQuiz();
      });

      prevBtn.addEventListener('click', () => navigateQuestion(-1));
      nextBtn.addEventListener('click', () => navigateQuestion(1));
      submitExamBtn.addEventListener('click', submitExam);
      
      modalReviewBtn.addEventListener('click', () => {
        reportOverlay.classList.remove('show');
        renderQuestion();
        renderNavigator();
      });
      modalRetryBtn.addEventListener('click', () => {
        reportOverlay.classList.remove('show');
        resetQuiz();
      });

      resetQuiz();
    }

    // 主題切換
    function setTheme(theme) {
      state.theme = theme;
      document.body.setAttribute('data-theme', theme);
      localStorage.setItem('ipas_theme', theme);
      
      if (theme === 'light') {
        sunIcon.style.display = 'none';
        moonIcon.style.display = 'block';
      } else {
        sunIcon.style.display = 'block';
        moonIcon.style.display = 'none';
      }
    }

    function toggleTheme() {
      setTheme(state.theme === 'dark' ? 'light' : 'dark');
    }

    // 模式切換
    function switchMode(mode) {
      state.mode = mode;
      localStorage.setItem('ipas_mode', mode);
      
      if (mode === 'single') {
        modeSingleBtn.classList.add('active');
        modeExamBtn.classList.remove('active');
        navigatorCard.style.display = 'none';
        examTimer.style.display = 'none';
        submitExamBtn.style.display = 'none';
        nextBtn.style.display = 'inline-flex';
        
        // 停止模擬考計時器
        clearInterval(state.examTimerInterval);
      } else {
        modeExamBtn.classList.add('active');
        modeSingleBtn.classList.remove('active');
        navigatorCard.style.display = 'block';
        examTimer.style.display = 'flex';
        
        // 如果還沒送出，顯示交卷按鈕
        if (!state.examSubmitted) {
          submitExamBtn.style.display = 'inline-flex';
        } else {
          submitExamBtn.style.display = 'none';
        }
      }
      
      resetQuiz();
    }

    // 重設練習
    function resetQuiz() {
      // 根據範圍篩選題目
      let filtered = [...rawData];
      if (state.range === '1-25') {
        filtered = filtered.filter(q => q.id >= 1 && q.id <= 25);
      } else if (state.range === '26-50') {
        filtered = filtered.filter(q => q.id >= 26 && q.id <= 50);
      }

      // 隨機亂序
      if (state.shuffle) {
        filtered.sort(() => Math.random() - 0.5);
      }

      state.questions = filtered;
      state.currentIndex = 0;
      
      // 清除作答紀錄
      state.singleAnswers = {};
      state.examAnswers = {};
      state.examSubmitted = false;
      state.examDurationSeconds = 0;
      
      // 重設計時器
      clearInterval(state.examTimerInterval);
      if (state.mode === 'exam') {
        startExamTimer();
        submitExamBtn.style.display = 'inline-flex';
      }

      // 隱藏自修模式的解析面板
      explanationPanel.classList.remove('show');

      renderQuestion();
      renderStats();
      renderNavigator();
    }

    // 計時器邏輯
    function startExamTimer() {
      state.examStartTime = Date.now();
      timerVal.textContent = "00:00";
      state.examTimerInterval = setInterval(() => {
        state.examDurationSeconds++;
        const mins = String(Math.floor(state.examDurationSeconds / 60)).padStart(2, '0');
        const secs = String(state.examDurationSeconds % 60).padStart(2, '0');
        timerVal.textContent = `${mins}:${secs}`;
      }, 1000);
    }

    // 渲染單題內容
    function renderQuestion() {
      if (state.questions.length === 0) {
        questionBody.innerHTML = `<div class="empty-state">此範圍內無題目</div>`;
        optionsList.innerHTML = '';
        return;
      }

      const q = state.questions[state.currentIndex];
      questionNumBadge.textContent = `第 ${state.currentIndex + 1} 題 / 共 ${state.questions.length} 題 (原始題號: ${q.id})`;
      questionBody.textContent = q.question;

      // 載入選項
      optionsList.innerHTML = '';
      
      // 獲取此題在各模式下的答案
      const selected = state.mode === 'single' ? state.singleAnswers[q.id] : state.examAnswers[q.id];

      for (const optKey of ['A', 'B', 'C', 'D']) {
        const optionItem = document.createElement('div');
        optionItem.className = 'option-item';
        
        optionItem.innerHTML = `
          <span class="option-label">${optKey}</span>
          <span class="option-text">${escapeHtml(q.options[optKey])}</span>
        `;

        // 自修/練習模式判定
        if (state.mode === 'single') {
          if (selected) {
            // 已作答狀態
            if (optKey === q.answer) {
              optionItem.classList.add('correct');
            } else if (optKey === selected) {
              optionItem.classList.add('wrong');
            }
          } else {
            // 未作答，綁定點擊事件
            optionItem.addEventListener('click', () => selectSingleOption(optKey));
          }
        } 
        // 模擬考模式判定
        else {
          if (!state.examSubmitted) {
            // 未交卷
            if (selected === optKey) {
              optionItem.classList.add('selected');
            }
            optionItem.addEventListener('click', () => selectExamOption(optKey));
          } else {
            // 已交卷，顯示正確與否
            if (optKey === q.answer) {
              optionItem.classList.add('correct');
            } else if (optKey === selected) {
              optionItem.classList.add('wrong');
            }
          }
        }

        optionsList.appendChild(optionItem);
      }

      // 控制自修模式的解析顯示
      if (state.mode === 'single' && selected) {
        const isCorrect = selected === q.answer;
        explanationPanel.className = `explanation-panel show ${isCorrect ? 'correct-explanation' : 'wrong-explanation'}`;
        explanationTitle.innerHTML = isCorrect ? 
          `🎉 答對了！` : 
          `❌ 答錯了！正確答案是 <span style="font-weight: 800; font-size: 1.1rem; color: var(--danger); text-decoration: underline;">${q.answer}</span>`;
        explanationText.textContent = `這題的正確解答為選項 (${q.answer})。您可以對照官方試題以了解相關的 AI 基本觀念。`;
      } else if (state.mode === 'exam' && state.examSubmitted) {
        // 模擬考已交卷，也可以看答案解析
        const isCorrect = selected === q.answer;
        explanationPanel.className = `explanation-panel show ${isCorrect ? 'correct-explanation' : 'wrong-explanation'}`;
        explanationTitle.innerHTML = isCorrect ? 
          `🎉 答對了！` : 
          `❌ 答錯了！正確答案是 <span style="font-weight: 800; font-size: 1.1rem; color: var(--danger); text-decoration: underline;">${q.answer}</span>`;
        explanationText.textContent = `這題的正確解答為選項 (${q.answer})。`;
      } else {
        explanationPanel.classList.remove('show');
      }

      // 按鈕狀態控制
      prevBtn.disabled = state.currentIndex === 0;
      
      if (state.currentIndex === state.questions.length - 1) {
        nextBtn.style.display = 'none';
      } else {
        nextBtn.style.display = 'inline-flex';
      }
    }

    // 單題模式下選擇答案
    function selectSingleOption(optKey) {
      const q = state.questions[state.currentIndex];
      state.singleAnswers[q.id] = optKey;
      renderQuestion();
      renderStats();
    }

    // 模擬考模式下選擇答案
    function selectExamOption(optKey) {
      const q = state.questions[state.currentIndex];
      state.examAnswers[q.id] = optKey;
      renderQuestion();
      renderStats();
      renderNavigator();
    }

    // 導航跳題
    function navigateQuestion(direction) {
      const nextIdx = state.currentIndex + direction;
      if (nextIdx >= 0 && nextIdx < state.questions.length) {
        state.currentIndex = nextIdx;
        renderQuestion();
        renderNavigator();
      }
    }

    // 跳轉至指定題目的索引
    function jumpToQuestion(index) {
      state.currentIndex = index;
      renderQuestion();
      renderNavigator();
    }

    // 統計計算與更新
    function renderStats() {
      const total = state.questions.length;
      
      if (state.mode === 'single') {
        const answeredList = Object.keys(state.singleAnswers);
        const answeredCount = answeredList.length;
        
        let correctCount = 0;
        answeredList.forEach(qId => {
          const origQ = rawData.find(item => item.id == qId);
          if (origQ && state.singleAnswers[qId] === origQ.answer) {
            correctCount++;
          }
        });
        const wrongCount = answeredCount - correctCount;
        const rate = answeredCount > 0 ? Math.round((correctCount / answeredCount) * 100) : 0;

        statProgress.textContent = `${answeredCount} / ${total}`;
        statCorrectWrong.innerHTML = `${correctCount} <span style="color: var(--text-muted);">/</span> <span style="color: var(--danger);">${wrongCount}</span>`;
        statRate.textContent = `${rate}%`;
        
        const percent = total > 0 ? (answeredCount / total) * 100 : 0;
        progressBarFill.style.width = `${percent}%`;
      } 
      else {
        // 模擬考模式
        const answeredCount = Object.keys(state.examAnswers).length;
        
        if (!state.examSubmitted) {
          statProgress.textContent = `${answeredCount} / ${total}`;
          statCorrectWrong.innerHTML = `- <span style="color: var(--text-muted);">/</span> -`;
          statRate.textContent = `-`;
          const percent = total > 0 ? (answeredCount / total) * 100 : 0;
          progressBarFill.style.width = `${percent}%`;
        } else {
          // 已交卷，顯示真實統計
          let correctCount = 0;
          state.questions.forEach(q => {
            if (state.examAnswers[q.id] === q.answer) {
              correctCount++;
            }
          });
          const wrongCount = total - correctCount;
          const rate = Math.round((correctCount / total) * 100);

          statProgress.textContent = `${total} / ${total}`;
          statCorrectWrong.innerHTML = `${correctCount} <span style="color: var(--text-muted);">/</span> <span style="color: var(--danger);">${wrongCount}</span>`;
          statRate.textContent = `${rate}%`;
          progressBarFill.style.width = `100%`;
        }
      }
    }

    // 渲染導航九宮格 (模擬考模式專屬)
    function renderNavigator() {
      if (state.mode !== 'exam') return;

      navigatorGrid.innerHTML = '';
      state.questions.forEach((q, idx) => {
        const dot = document.createElement('div');
        dot.className = 'nav-dot';
        dot.textContent = idx + 1;

        if (idx === state.currentIndex) {
          dot.classList.add('current');
        }

        if (!state.examSubmitted) {
          // 未交卷：只標示是否已答
          if (state.examAnswers[q.id]) {
            dot.classList.add('answered');
          }
        } else {
          // 已交卷：標示對錯
          const selected = state.examAnswers[q.id];
          if (selected === q.answer) {
            dot.classList.add('correct');
          } else {
            dot.classList.add('wrong');
          }
        }

        dot.addEventListener('click', () => jumpToQuestion(idx));
        navigatorGrid.appendChild(dot);
      });
    }

    // 送出考試並顯示報告
    function submitExam() {
      const answeredCount = Object.keys(state.examAnswers).length;
      const total = state.questions.length;

      if (answeredCount < total) {
        if (!confirm(`您還有 ${total - answeredCount} 題尚未作答，確定要交卷評分嗎？`)) {
          return;
        }
      }

      // 停止計時
      clearInterval(state.examTimerInterval);
      state.examSubmitted = true;
      submitExamBtn.style.display = 'none';

      // 計算成績與 PR
      let correctCount = 0;
      state.questions.forEach(q => {
        if (state.examAnswers[q.id] === q.answer) {
          correctCount++;
        }
      });
      
      const score = Math.round((correctCount / total) * 100);
      const wrongCount = total - correctCount;

      // 估算 PR 值（簡單模擬常態分佈，模擬原 score-simulator 的公式）
      let pr = 50;
      if (score >= 95) pr = 99;
      else if (score >= 90) pr = 95;
      else if (score >= 80) pr = 88;
      else if (score >= 70) pr = 75;
      else if (score >= 60) pr = 60;
      else if (score >= 50) pr = 45;
      else if (score >= 40) pr = 30;
      else pr = Math.max(5, score - 10);

      // 格式化時間
      const mins = String(Math.floor(state.examDurationSeconds / 60)).padStart(2, '0');
      const secs = String(state.examDurationSeconds % 60).padStart(2, '0');
      const timeStr = `${mins}:${secs}`;

      // 渲染報告內容
      reportScore.textContent = score;
      reportCorrectCount.textContent = correctCount;
      reportWrongCount.textContent = wrongCount;
      reportTimeUsed.textContent = timeStr;
      reportPr.textContent = `PR ${pr}`;

      // 顯示 Modal Overlay
      reportOverlay.classList.add('show');
      
      // 更新統計與 UI
      renderStats();
      renderQuestion();
      renderNavigator();
    }

    // 工具函式：跳脫 HTML 標籤避免注入
    function escapeHtml(text) {
      if (!text) return '';
      return text
        .replace(/&/g, "&amp;")
        .replace(/</g, "&lt;")
        .replace(/>/g, "&gt;")
        .replace(/"/g, "&quot;")
        .replace(/'/g, "&#039;");
    }

    // 啟動初始化
    window.onload = init;
  </script>
</body>
</html>
