<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shortlink Router</title>
</head>
<body style="font-family: sans-serif; padding: 40px; line-height: 1.6;">
  <h2 id="title">Routing...</h2>
  <p id="message">Checking route...</p>
  <p id="version" style="color:#666; font-size:12px; margin-top:0;">Router Updated: 2026-03-27 19:45 TPE</p>
  <pre id="details"></pre>

  <script>
    const GAS_LOOKUP_URL = "https://script.google.com/macros/s/AKfycbylx91OxTOiYUicQcGNxIUWarbswCg0yBcHj5vzMfJRE2fFKStd4USdNuN8dWoM2x1qJA/exec";
    const FALLBACK_JSON_URL = "/links.json";
    const LOOKUP_TIMEOUT_MS = 3000;
    const ROUTER_UPDATED_AT_TPE = "2026-03-27 19:45";
    const path = window.location.pathname;
    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const version = document.getElementById("version");
    const details = document.getElementById("details");

    version.textContent = "Router Updated: " + ROUTER_UPDATED_AT_TPE + " TPE";

    function showState(nextTitle, nextMessage, nextDetails) {
      title.textContent = nextTitle;
      message.textContent = nextMessage;
      details.textContent = nextDetails;
    }

    function isValidTargetUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.protocol === "http:" || parsed.protocol === "https:";
      } catch (error) {
        return false;
      }
    }

    function extractTargetUrl(record) {
      if (typeof record === "string") {
        return record.trim();
      }

      if (record && typeof record === "object" && !Array.isArray(record)) {
        const status = String(record.status || "active").toLowerCase();
        const candidateUrl = String(record.target_url || "").trim();

        if (status === "active") {
          return candidateUrl;
        }
      }

      return "";
    }

    function lookupViaGasJsonp(slug) {
      return new Promise(function(resolve) {
        const callbackToken = "__faloShortlinkLookup_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        const callbackName = "window." + callbackToken;
        const script = document.createElement("script");
        let done = false;

        function finish(result) {
          if (done) {
            return;
          }
          done = true;
          window.clearTimeout(timeoutId);
          try {
            delete window[callbackToken];
          } catch (error) {
            window[callbackToken] = undefined;
          }
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
          resolve(result);
        }

        window[callbackToken] = function(data) {
          if (!data || typeof data !== "object" || Array.isArray(data)) {
            finish({
              found: false,
              source: "gas-jsonp",
              reason: "invalid_response"
            });
            return;
          }

          if (String(data.status || "").toLowerCase() === "ok" && isValidTargetUrl(data.target)) {
            finish({
              found: true,
              targetUrl: String(data.target).trim(),
              source: "gas-jsonp"
            });
            return;
          }

          finish({
            found: false,
            source: "gas-jsonp",
            reason: String(data.status || "invalid_response")
          });
        };

        script.onerror = function() {
          finish({
            found: false,
            source: "gas-jsonp",
            reason: "script_error"
          });
        };

        const timeoutId = window.setTimeout(function() {
          finish({
            found: false,
            source: "gas-jsonp",
            reason: "timeout"
          });
        }, LOOKUP_TIMEOUT_MS);

        const url = new URL(GAS_LOOKUP_URL);
        url.searchParams.set("action", "lookup");
        url.searchParams.set("slug", slug);
        url.searchParams.set("callback", callbackName);
        url.searchParams.set("_", Date.now());
        script.src = url.toString();
        document.head.appendChild(script);
      });
    }

    async function lookupViaGasFetch(slug) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), LOOKUP_TIMEOUT_MS);

      try {
        const url = new URL(GAS_LOOKUP_URL);
        url.searchParams.set("action", "lookup");
        url.searchParams.set("slug", slug);

        const response = await fetch(url.toString(), {
          cache: "no-store",
          credentials: "omit",
          mode: "cors",
          redirect: "follow",
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error("GAS lookup HTTP " + response.status);
        }

        const data = await response.json();

        if (!data || typeof data !== "object" || Array.isArray(data)) {
          throw new Error("GAS lookup must return a JSON object.");
        }

        if (String(data.status || "").toLowerCase() === "ok" && isValidTargetUrl(data.target)) {
          return {
            found: true,
            targetUrl: String(data.target).trim(),
            source: "gas-fetch"
          };
        }

        return {
          found: false,
          source: "gas-fetch",
          reason: String(data.status || "invalid_response")
        };
      } catch (error) {
        return {
          found: false,
          source: "gas-fetch",
          reason: error.name === "AbortError" ? "timeout" : error.message
        };
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    async function lookupViaFallbackJson(slug) {
      const response = await fetch(FALLBACK_JSON_URL, { cache: "no-store" });

      if (!response.ok) {
        throw new Error("Unable to load " + FALLBACK_JSON_URL + " (HTTP " + response.status + ")");
      }

      const data = await response.json();

      if (!data || typeof data !== "object" || Array.isArray(data)) {
        throw new Error(FALLBACK_JSON_URL + " must be a JSON object.");
      }

      const record = data[String(slug).toLowerCase()];
      const targetUrl = extractTargetUrl(record);

      if (!isValidTargetUrl(targetUrl)) {
        return {
          found: false,
          source: "fallback",
          reason: "not_found"
        };
      }

      return {
        found: true,
        targetUrl,
        source: "fallback"
      };
    }

    async function routeShortlink() {
      const parts = path.split("/").filter(Boolean);

      if (parts[0] !== "go") {
        showState(
          "404 Not Found",
          "This route is not handled by the shortlink router.",
          "Path: " + path
        );
        return;
      }

      const slug = parts[1] || "";

      if (!slug) {
        showState(
          "Shortlink not found",
          "This /go/ shortlink was not found.",
          "Path: " + path + "\nSlug: (none)"
        );
        return;
      }

      showState(
        "Checking shortlink...",
        "Looking up the slug in GAS first, then fallback JSON if needed.",
        "Path: " + path + "\nSlug: " + slug
      );

      try {
        const lookupKey = String(slug).toLowerCase();
        let gasResult = await lookupViaGasJsonp(lookupKey);

        if (!gasResult.found && gasResult.reason !== "not_found") {
          gasResult = await lookupViaGasFetch(lookupKey);
        }

        if (gasResult.found) {
          showState(
            "Redirecting...",
            "Shortlink found from GAS. Redirecting now.",
            "Slug: " + lookupKey + "\nSource: " + gasResult.source + "\nTarget: " + gasResult.targetUrl + "\nRouter Updated: " + ROUTER_UPDATED_AT_TPE + " TPE"
          );
          window.location.replace(gasResult.targetUrl);
          return;
        }

        const fallbackResult = await lookupViaFallbackJson(lookupKey);

        if (fallbackResult.found) {
          showState(
            "Redirecting...",
            "GAS did not return a usable result. Using fallback JSON.",
            "Slug: " + lookupKey + "\nSource: fallback JSON\nGAS result: " + gasResult.reason + "\nTarget: " + fallbackResult.targetUrl + "\nRouter Updated: " + ROUTER_UPDATED_AT_TPE + " TPE"
          );
          window.location.replace(fallbackResult.targetUrl);
          return;
        }

        showState(
          "Shortlink not found",
          "This /go/ shortlink was not found in GAS or fallback JSON.",
          "Path: " + path + "\nSlug: " + lookupKey + "\nGAS result: " + gasResult.reason + "\nRouter Updated: " + ROUTER_UPDATED_AT_TPE + " TPE"
        );
      } catch (error) {
        showState(
          "Shortlink lookup failed",
          "The router could not complete the shortlink lookup.",
          "Path: " + path + "\nSlug: " + slug + "\nError: " + error.message + "\nRouter Updated: " + ROUTER_UPDATED_AT_TPE + " TPE"
        );
      }
    }

    routeShortlink();
  </script>
</body>
</html>
