<script>
const path = location.pathname;

// 只處理 /go/
if (path.startsWith("/go/")) {

  const parts = path.split("/").filter(Boolean);
  const slug = parts[1]; // /go/123 → 123

  const map = {
    "123": "https://google.com",
    "demo": "https://force.formosa-ai.com"
  };

  if (map[slug]) {
    location.replace(map[slug]);
  } else {
    document.body.innerHTML = "<h2>Shortlink not found</h2>";
  }

} else {

  document.body.innerHTML = "<h2>404 Not Found</h2>";

}
</script>
