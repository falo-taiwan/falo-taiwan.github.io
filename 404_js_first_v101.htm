<!doctype html>
<!--

Strategy: JSON first
Version: 404_js_first_v101
Last Updated: 2026-03-27 20:27 TPE

Website: https://force.formosa-ai.com

Notes:
- This file is the maintenance source for the shortlink router.
- Deploy this file manually to your website root as /404.html for GitHub Pages fallback routing.
- Recent testing showed that timeout was the main cause of false failures on valid shortlinks.
- This version now checks published JSON first, then queries GAS only when JSON has no match.
- Only `/go/<slug>` routes wait longer. Other routes still respond quickly.
- If lookup still fails, show detailed error codes so the user knows whether JSON or GAS caused the miss.
-->
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Shortlink Router</title>
</head>
<body style="font-family: sans-serif; padding: 40px; line-height: 1.6;">
  <h2 id="title">Routing...</h2>
  <p id="message">Checking this link...</p>
  <p id="version" style="color:#666; font-size:12px; margin-top:0;">Router Updated: 2026-03-27 20:27 TPE</p>
  <pre id="details"></pre>

  <script>
    const GAS_LOOKUP_URL = "https://script.google.com/macros/s/AKfycbylx91OxTOiYUicQcGNxIUWarbswCg0yBcHj5vzMfJRE2fFKStd4USdNuN8dWoM2x1qJA/exec";
    const FALLBACK_JSON_URL = "/links.json";
    const LOOKUP_TIMEOUT_MS = 9100;
    const ROUTER_UPDATED_AT_TPE = "2026-03-27 20:27";
    const path = window.location.pathname;
    const title = document.getElementById("title");
    const message = document.getElementById("message");
    const version = document.getElementById("version");
    const details = document.getElementById("details");

    version.textContent = "Router Updated: " + ROUTER_UPDATED_AT_TPE + " TPE";

    function showState(nextTitle, nextMessage, nextDetails) {
      title.textContent = nextTitle;
      message.textContent = nextMessage;
      details.textContent = nextDetails;
    }

    function getReasonCode(source, reason) {
      const normalizedSource = String(source || "router").toLowerCase();
      const normalizedReason = String(reason || "unknown").toLowerCase();

      if (normalizedSource === "gas-jsonp") {
        if (normalizedReason === "timeout") return "GAS_JSONP_TIMEOUT";
        if (normalizedReason === "script_error") return "GAS_JSONP_SCRIPT_ERROR";
        if (normalizedReason === "invalid_response") return "GAS_JSONP_INVALID_RESPONSE";
        if (normalizedReason === "not_found") return "GAS_JSONP_NOT_FOUND";
        return "GAS_JSONP_ERROR";
      }

      if (normalizedSource === "gas-fetch") {
        if (normalizedReason === "timeout") return "GAS_FETCH_TIMEOUT";
        if (normalizedReason.indexOf("http ") === 0) {
          return "GAS_FETCH_" + normalizedReason.replace(/[^0-9]/g, "");
        }
        if (normalizedReason === "invalid_response") return "GAS_FETCH_INVALID_RESPONSE";
        if (normalizedReason === "not_found") return "GAS_FETCH_NOT_FOUND";
        return "GAS_FETCH_ERROR";
      }

      if (normalizedSource === "fallback") {
        if (normalizedReason === "not_found") return "FALLBACK_NOT_FOUND";
        return "FALLBACK_ERROR";
      }

      return "ROUTER_ERROR";
    }

    function getErrorCodeFromMessage(message) {
      const normalizedMessage = String(message || "").toLowerCase();
      if (normalizedMessage.indexOf("/links.json") !== -1) {
        return "FALLBACK_LOAD_ERROR";
      }
      if (normalizedMessage.indexOf("json object") !== -1) {
        return "ROUTER_INVALID_JSON";
      }
      return "ROUTER_RUNTIME_ERROR";
    }

    function redirectToTarget(targetUrl) {
      // Some in-app browsers accept assign/href more reliably than replace.
      try {
        window.location.replace(targetUrl);
      } catch (error) {
        // Ignore and continue to compatibility fallback.
      }

      window.setTimeout(function() {
        if (window.location.href !== targetUrl) {
          try {
            window.location.assign(targetUrl);
          } catch (error) {
            window.location.href = targetUrl;
          }
        }
      }, 80);
    }

    function isValidTargetUrl(url) {
      try {
        const parsed = new URL(url);
        return parsed.protocol === "http:" || parsed.protocol === "https:";
      } catch (error) {
        return false;
      }
    }

    function extractTargetUrl(record) {
      if (typeof record === "string") {
        return record.trim();
      }

      if (record && typeof record === "object" && !Array.isArray(record)) {
        const status = String(record.status || "active").toLowerCase();
        const candidateUrl = String(record.target_url || "").trim();

        if (status === "active") {
          return candidateUrl;
        }
      }

      return "";
    }

    function lookupViaGasJsonp(slug) {
      return new Promise(function(resolve) {
        const callbackToken = "__faloShortlinkLookup_" + Date.now() + "_" + Math.floor(Math.random() * 10000);
        const callbackName = "window." + callbackToken;
        const script = document.createElement("script");
        let done = false;

        function finish(result) {
          if (done) {
            return;
          }
          done = true;
          window.clearTimeout(timeoutId);
          try {
            delete window[callbackToken];
          } catch (error) {
            window[callbackToken] = undefined;
          }
          if (script.parentNode) {
            script.parentNode.removeChild(script);
          }
          resolve(result);
        }

        window[callbackToken] = function(data) {
          if (!data || typeof data !== "object" || Array.isArray(data)) {
            finish({
              found: false,
              source: "gas-jsonp",
              reason: "invalid_response"
            });
            return;
          }

          if (String(data.status || "").toLowerCase() === "ok" && isValidTargetUrl(data.target)) {
            finish({
              found: true,
              targetUrl: String(data.target).trim(),
              source: "gas-jsonp"
            });
            return;
          }

          finish({
            found: false,
            source: "gas-jsonp",
            reason: String(data.status || "invalid_response")
          });
        };

        script.onerror = function() {
          finish({
            found: false,
            source: "gas-jsonp",
            reason: "script_error"
          });
        };

        const timeoutId = window.setTimeout(function() {
          finish({
            found: false,
            source: "gas-jsonp",
            reason: "timeout"
          });
        }, LOOKUP_TIMEOUT_MS);

        const url = new URL(GAS_LOOKUP_URL);
        url.searchParams.set("action", "lookup");
        url.searchParams.set("slug", slug);
        url.searchParams.set("callback", callbackName);
        url.searchParams.set("_", Date.now());
        script.src = url.toString();
        document.head.appendChild(script);
      });
    }

    async function lookupViaGasFetch(slug) {
      const controller = new AbortController();
      const timeoutId = window.setTimeout(() => controller.abort(), LOOKUP_TIMEOUT_MS);

      try {
        const url = new URL(GAS_LOOKUP_URL);
        url.searchParams.set("action", "lookup");
        url.searchParams.set("slug", slug);

        const response = await fetch(url.toString(), {
          cache: "no-store",
          credentials: "omit",
          mode: "cors",
          redirect: "follow",
          signal: controller.signal
        });

        if (!response.ok) {
          throw new Error("GAS lookup HTTP " + response.status);
        }

        const data = await response.json();

        if (!data || typeof data !== "object" || Array.isArray(data)) {
          throw new Error("GAS lookup must return a JSON object.");
        }

        if (String(data.status || "").toLowerCase() === "ok" && isValidTargetUrl(data.target)) {
          return {
            found: true,
            targetUrl: String(data.target).trim(),
            source: "gas-fetch"
          };
        }

        return {
          found: false,
          source: "gas-fetch",
          reason: String(data.status || "invalid_response")
        };
      } catch (error) {
        return {
          found: false,
          source: "gas-fetch",
          reason: error.name === "AbortError" ? "timeout" : error.message
        };
      } finally {
        window.clearTimeout(timeoutId);
      }
    }

    async function lookupViaFallbackJson(slug) {
      const response = await fetch(FALLBACK_JSON_URL, { cache: "no-store" });

      if (!response.ok) {
        throw new Error("Unable to load " + FALLBACK_JSON_URL + " (HTTP " + response.status + ")");
      }

      const data = await response.json();

      if (!data || typeof data !== "object" || Array.isArray(data)) {
        throw new Error(FALLBACK_JSON_URL + " must be a JSON object.");
      }

      const record = data[String(slug).toLowerCase()];
      const targetUrl = extractTargetUrl(record);

      if (!isValidTargetUrl(targetUrl)) {
        return {
          found: false,
          source: "fallback",
          reason: "not_found"
        };
      }

      return {
        found: true,
        targetUrl,
        source: "fallback"
      };
    }

    async function routeShortlink() {
      const parts = path.split("/").filter(Boolean);

      if (parts[0] !== "go") {
        showState(
          "404 Not Found",
          "This page is not handled by the shortlink router.",
          "Path: " + path
        );
        return;
      }

      const slug = parts[1] || "";

      if (!slug) {
        showState(
          "Shortlink not found",
          "This shortlink is missing its code.",
          "Error Code: GO_SLUG_MISSING\nPath: " + path + "\nSlug: (none)"
        );
        return;
      }

      showState(
        "Checking shortlink...",
        "Checking the published list first. If it is not there, I will try the live shortlink service. That second step can take longer.",
        "Path: " + path + "\nSlug: " + slug
      );

      try {
        const lookupKey = String(slug).toLowerCase();
        const fallbackResult = await lookupViaFallbackJson(lookupKey);

        if (fallbackResult.found) {
          showState(
            "Redirecting...",
            "Found it in the published list. Redirecting now.",
            "Slug: " + lookupKey + "\nSource: fallback JSON\nTarget: " + fallbackResult.targetUrl + "\nResult Code: LOOKUP_OK_JSON_FIRST\nRouter Updated: " + ROUTER_UPDATED_AT_TPE + " TPE"
          );
          redirectToTarget(fallbackResult.targetUrl);
          return;
        }

        showState(
          "Checking live service...",
          "This shortlink is not in the published list. Trying the live shortlink service now. This can take a bit longer.",
          "Path: " + path + "\nSlug: " + lookupKey + "\nJSON result: not_found\nJSON error code: FALLBACK_NOT_FOUND\nRouter Updated: " + ROUTER_UPDATED_AT_TPE + " TPE"
        );

        let gasResult = await lookupViaGasJsonp(lookupKey);

        if (!gasResult.found && gasResult.reason !== "not_found") {
          gasResult = await lookupViaGasFetch(lookupKey);
        }

        if (gasResult.found) {
          showState(
            "Redirecting...",
            "The published list did not have this shortlink, but the live service found it. Redirecting now.",
            "Slug: " + lookupKey + "\nSource: " + gasResult.source + "\nJSON error code: FALLBACK_NOT_FOUND\nTarget: " + gasResult.targetUrl + "\nResult Code: LOOKUP_OK_GAS_AFTER_JSON_MISS\nRouter Updated: " + ROUTER_UPDATED_AT_TPE + " TPE"
          );
          redirectToTarget(gasResult.targetUrl);
          return;
        }

        const gasCode = getReasonCode(gasResult.source, gasResult.reason);
        showState(
          "Shortlink not found",
          "I could not find this shortlink in the published list or the live shortlink service.",
          "Path: " + path + "\nSlug: " + lookupKey + "\nError Code: SHORTLINK_NOT_FOUND\nJSON error code: FALLBACK_NOT_FOUND\nGAS result: " + gasResult.reason + "\nGAS error code: " + gasCode + "\nRouter Updated: " + ROUTER_UPDATED_AT_TPE + " TPE"
        );
      } catch (error) {
        const runtimeCode = getErrorCodeFromMessage(error.message);
        showState(
          "Shortlink lookup failed",
          "The router could not finish checking this shortlink.",
          "Path: " + path + "\nSlug: " + slug + "\nError Code: " + runtimeCode + "\nError: " + error.message + "\nRouter Updated: " + ROUTER_UPDATED_AT_TPE + " TPE"
        );
      }
    }

    routeShortlink();
  </script>
</body>
</html>
